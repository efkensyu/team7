<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>予定詳細</title>
</head>
<body>

    <h2 th:text="${year} + '年' + ${month} + '月' + ${day} + '日の予定'"></h2>

    <!-- 予定一覧テーブル -->
    <table>
        <thead>
            <tr>
                <th>予定ID</th>
                <th>予定名</th>
                <th>詳細</th>
                <th>ユーザーID</th>
            </tr>
        </thead>
        <tbody>
            <tr th:each="s : ${schedules}">  <!-- ← schedulesに修正 -->
                <td th:text="${s.yoteiCd}"></td>
                <td th:text="${s.yoteiNm}"></td>
                <td th:text="${s.yoteiDetail}"></td>
                <td th:text="${s.userId}"></td>
                <!-- 削除ボタンは行ごとに配置 -->
                <td>
                    <form action="/Team7_fromDisplay" method="post">
                        <input type="hidden" name="year"    th:value="${year}" />
                        <input type="hidden" name="month"   th:value="${month}" />
                        <input type="hidden" name="day"     th:value="${day}" />
                        <input type="hidden" name="yoteiCd" th:value="${s.yoteiCd}" />
                        <button type="submit" name="confirm">🗑 削除</button>
                    </form>
                </td>
            </tr>
        </tbody>
    </table>

    <!-- カレンダーに戻るボタン（別フォーム） -->
    <form action="/Team7_fromDisplay" method="post">
        <input type="hidden" name="year"  th:value="${year}" />
        <input type="hidden" name="month" th:value="${month}" />
        <input type="hidden" name="day"   th:value="${day}" />
        <button type="submit" name="backCalender">← カレンダーに戻る</button>
    </form>

</body>
</html>
